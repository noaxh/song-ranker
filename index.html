<script>
// If the module graph fails to load (usually a stale-cache mix after an update),
// surface it instead of leaving a dead page.
window.addEventListener('error', function (e) {
  if (window.__srBooted || document.getElementById('boot-fail')) return;
  var d = document.createElement('div');
  d.id = 'boot-fail';
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#7f1d1d;color:#fff;padding:14px 18px;font:14px/1.5 sans-serif';
  d.innerHTML = '<b>Song Ranker failed to start.</b> Usually a stale cache after an update — press <b>Ctrl+F5</b> (hard refresh). ' +
    'If it persists, the error was: <code style="background:#0008;padding:2px 6px;border-radius:4px">' +
    String(e.message || e.error || 'unknown').replace(/</g, '&lt;') + '</code>';
  document.body.appendChild(d);
}, true);
</script>

      <img id="pb-art" alt="" hidden>
      <div class="pb-meta"><div id="pb-name"></div><div id="pb-artist"></div></div>
    </div>
    <div class="pb-center">
      <div class="pb-controls">
        <button class="btn-icon pb-mode" id="pb-shuffle" aria-label="Shuffle off" title="Shuffle"><svg><use href="#i-shuffle"/></svg></button>
        <button class="btn-icon" id="pb-prev" aria-label="Previous track"><svg><use href="#i-prev"/></svg></button>
        <button class="btn-icon pb-play" id="pb-toggle" aria-label="Play or pause"><svg><use href="#i-play"/></svg></button>
        <button class="btn-icon" id="pb-next" aria-label="Next track"><svg><use href="#i-next"/></svg></button>
        <button class="btn-icon pb-mode" id="pb-repeat" aria-label="Repeat off" title="Repeat"><svg><use href="#i-repeat"/></svg></button>
      </div>
      <div class="pb-seek">
        <span id="pb-cur">0:00</span>
        <input type="range" id="pb-seek" min="0" max="1000" value="0" aria-label="Seek position">
        <span id="pb-dur">0:00</span>
      </div>
    </div>
    <div class="pb-right">
      <button class="btn-icon pb-mode" id="pb-more" aria-label="Song options" aria-haspopup="menu" title="Song options"><svg><use href="#i-dots"/></svg></button>
      <button class="btn-icon pb-mode" id="pb-queue" aria-label="Show queue" title="Up next"><svg><use href="#i-queue"/></svg></button>
      <svg class="vol-ic"><use href="#i-volume"/></svg>
      <input type="range" id="pb-vol" min="0" max="100" value="70" aria-label="Volume">
    </div>
    <div class="pb-queue-pop" id="pb-queue-pop" role="listbox" aria-label="Up next" hidden></div>
  </footer>
</div>

<div id="modal-root"></div>
<div id="ctx-root"></div>
<div id="toast-root" aria-live="polite"></div>
<div id="sr-live" class="sr-only" aria-live="polite" role="status"></div>
