<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Flowing sumi-e cloud/brush swirls. Used as a CSS alpha mask over the theme
       accent colour, so fill colour here is irrelevant; only shape + opacity read.
       fill-opacity gives the layered ink-wash tonal depth. -->
  <defs>
    <g id="swirl">
      <!-- sweeping ribbon curl -->
      <path d="M0,0 C70,-95 220,-100 250,-6 C272,66 196,128 128,110 C82,98 70,44 112,26 C140,14 164,42 150,64"
            fill="black"/>
      <!-- trailing wisp -->
      <path d="M236,-28 C320,-70 392,-44 430,18 C402,-2 352,-8 312,18 C286,34 258,28 236,-28Z"
            fill="black"/>
    </g>
    <g id="wisp">
      <path d="M0,0 C120,-40 250,-30 360,30 C430,68 520,70 600,40 C540,96 430,104 340,72 C250,42 150,52 60,96 C20,66 -8,36 0,0Z"
            fill="black"/>
    </g>
  </defs>

  <!-- bottom-weighted rising flow, varied scale / rotation / tone -->
  <use href="#swirl" transform="translate(120,720) rotate(-18) scale(1.5)"  fill-opacity="0.95"/>
  <use href="#swirl" transform="translate(320,760) rotate(6)  scale(1.05)"  fill-opacity="0.6"/>
  <use href="#wisp"  transform="translate(40,560)  rotate(-8)  scale(1.2)"   fill-opacity="0.5"/>
  <use href="#swirl" transform="translate(540,640) rotate(28) scale(0.85)"  fill-opacity="0.8"/>
  <use href="#wisp"  transform="translate(360,420) rotate(10) scale(1.4)"   fill-opacity="0.35"/>

  <!-- top-right counter-flow -->
  <use href="#swirl" transform="translate(1040,120) rotate(168) scale(1.35)" fill-opacity="0.9"/>
  <use href="#swirl" transform="translate(900,260)  rotate(150) scale(0.9)"  fill-opacity="0.55"/>
  <use href="#wisp"  transform="translate(1180,80)  rotate(196) scale(1.1)"  fill-opacity="0.4"/>
  <use href="#swirl" transform="translate(760,60)   rotate(135) scale(0.7)"  fill-opacity="0.7"/>

  <!-- mid drifting wisps for connective flow -->
  <use href="#wisp"  transform="translate(620,300) rotate(-4) scale(1.0)"   fill-opacity="0.25"/>
  <use href="#swirl" transform="translate(980,520) rotate(-40) scale(0.8)"  fill-opacity="0.45"/>
</svg>
