<svg viewBox="0 0 680 396" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sT sD">
<title id="sT">Option A filter spec: button states and popover anatomy</title>
<desc id="sD">The filter button has three states: idle, active with a count badge, and open. Opening shows a popover with a header and clear-all, a single-select status row, a two-thumb rating slider replacing the number boxes, multi-select tag chips, and a done button. Active filters render as removable chips under the bar.</desc>
<style>
text{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
.th{fill:#2C2C2A;font-weight:500;}
.ts{fill:#5F5E5A;}
.t{fill:#3C3489;font-weight:500;}
</style>
<rect width="680" height="396" fill="#FAFAF7"/>

<text x="14" y="16" class="th" font-size="13">button states</text>
<rect x="24" y="26" width="92" height="26" rx="8" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1"/><text x="40" y="43" class="ts" font-size="12">⚲ filter</text>
<text x="44" y="66" class="ts" font-size="11">idle</text>
<rect x="150" y="25" width="104" height="28" rx="8" fill="#CECBF6"/><text x="166" y="43" class="t" font-size="12">⚲ filter ②</text>
<text x="160" y="66" class="ts" font-size="11">active · badge</text>
<rect x="300" y="25" width="104" height="28" rx="8" fill="#CECBF6"/><text x="316" y="43" class="t" font-size="12">⚲ filter ②</text>
<rect x="296" y="21" width="112" height="36" rx="10" fill="none" stroke="#888780" stroke-dasharray="3 3"/>
<text x="316" y="66" class="ts" font-size="11">open</text>

<path d="M352 57 L352 86" fill="none" stroke="#888780" stroke-dasharray="3 3"/><path d="M352 86 l-4 -7 l8 0 z" fill="#888780"/>

<rect x="170" y="88" width="340" height="208" rx="12" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1"/>
<text x="186" y="110" class="th" font-size="13">filter</text>
<text x="446" y="110" class="ts" font-size="11">clear all</text>
<line x1="178" y1="120" x2="502" y2="120" stroke="#E4E4DF" stroke-width="1"/>

<text x="186" y="146" class="ts" font-size="11">status</text>
<rect x="244" y="134" width="38" height="18" rx="9" fill="#EFEFEA"/><text x="252" y="147" class="ts" font-size="11">all</text>
<rect x="288" y="134" width="54" height="18" rx="9" fill="#CECBF6"/><text x="296" y="147" class="t" font-size="11">rated</text>
<rect x="348" y="134" width="66" height="18" rx="9" fill="#EFEFEA"/><text x="356" y="147" class="ts" font-size="11">unrated</text>
<text x="424" y="147" class="ts" font-size="11">…</text>

<text x="186" y="186" class="ts" font-size="11">rating</text>
<line x1="244" y1="183" x2="490" y2="183" stroke="#D3D1C7" stroke-width="3" stroke-linecap="round"/>
<line x1="332" y1="183" x2="430" y2="183" stroke="#888780" stroke-width="3" stroke-linecap="round"/>
<circle cx="332" cy="183" r="6" fill="#FFFFFF" stroke="#888780" stroke-width="1.5"/>
<circle cx="430" cy="183" r="6" fill="#FFFFFF" stroke="#888780" stroke-width="1.5"/>
<text x="318" y="205" class="ts" font-size="11">700</text><text x="416" y="205" class="ts" font-size="11">1000</text>

<text x="186" y="240" class="ts" font-size="11">tags</text>
<rect x="244" y="228" width="48" height="18" rx="9" fill="#EFEFEA"/><text x="252" y="241" class="ts" font-size="11">chill</text>
<rect x="298" y="228" width="48" height="18" rx="9" fill="#CECBF6"/><text x="306" y="241" class="t" font-size="11">hype</text>

<line x1="178" y1="262" x2="502" y2="262" stroke="#E4E4DF" stroke-width="1"/>
<rect x="438" y="270" width="60" height="20" rx="6" fill="#CECBF6"/><text x="456" y="284" class="t" font-size="11">done</text>

<text x="14" y="328" class="th" font-size="12">active chips, under the bar</text>
<rect x="14" y="338" width="92" height="22" rx="11" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1"/><text x="24" y="353" class="ts" font-size="11">rated ✕</text>
<rect x="114" y="338" width="120" height="22" rx="11" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1"/><text x="124" y="353" class="ts" font-size="11">★ 700–1000 ✕</text>
<rect x="242" y="338" width="74" height="22" rx="11" fill="#FFFFFF" stroke="#CFCFC8" stroke-width="1"/><text x="252" y="353" class="ts" font-size="11">hype ✕</text>
<text x="332" y="353" class="ts" font-size="11">status = pick one · tags = toggle many · esc / click-away / done closes</text>
</svg>
